<!DOCTYPE html> 
<html style="padding: 0; margin: 0;"> 
    <head> 
        <meta charset="utf-8"> 
        <meta http-equiv="X-UA-Compatible" content="IE=edge"> 
        <title>Pc-utlån</title> <meta name="description" content=""> 
        <meta name="viewport" content="width=device-width, initial-scale=1"> 
        <link rel="stylesheet" href="style.css"> 
        <link href="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.css" rel="stylesheet"> 
    </head> 
    <body> 
        <div style="display: flex; flex-direction: row; height: 100vh;"> 
            <div style="display: flex; flex-direction: column; flex-basis: 10%; border: 1px solid black;"> 
                <button class="nav-btn" onclick="openList()"><img src="icons\list.png">Liste</button> 
                <button class="nav-btn" onclick="openCalendar()"><img src="icons/calendar.png">Kalender</button> 
                <button class="nav-btn" onclick="openPCs()"><img src="icons\pc.png">PC'er</button>
                <button onclick="logout()">Logg ut</button>
            </div> <div style="display: flex; flex-direction: column; flex: 1;"> 
                <div id="listPage" style="flex: 1;"> 
                    <div style="display: flex; flex-direction: column; border: 1px solid black; background-color: rgb(189, 189, 189);"> 
                        <div id="listDiv" class="listDiv"> 

                        </div> 
                    </div> 
                </div> 
                <div id="calendar">

                </div> 
                <div id="pcPage" style="display:flex; padding:10px; align-items: center; justify-content: center;">
                    <h3>Legg til PC</h3>
                    <input id="pcNumber" placeholder="PC nummer">
                    <input id="pcModel" placeholder="Modell">
                    <button onclick="addPC()">Legg til PC</button>

                    <h2>Forespørsler</h2>
                    <div id="requestList"></div>

                    <h2>Alle PC'er</h2>

                    <div id="pcList"></div>
                </div>
            </div> 
        </div> 
        <script src="oppdater_liste.js"></script> 
        <script src="auth.js"></script>
        <script src="https://cdn.jsdelivr.net/npm/fullcalendar@6.1.11/index.global.min.js"></script> 
    </body> 
</html>
