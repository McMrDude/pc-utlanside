<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PC Lån</title>
  <link rel="stylesheet" href="style.css"> 
</head>
<body>
  <div id="foresendt" style="position: fixed;">
    <h3>Forespørsel sendt</h3>
  </div>
  <button id="adminBtn" style="display: none;" onclick="location.href='/admin.html'">
    Admin
    <div id="adminAlert" style="width: 60px;background-color: rgb(11, 115, 170); 
    padding: 5px; border-radius: 30px; position: absolute; 
    font-size: 10px; display: none">Forespørsel !</div>
  </button>
  <button style="position: absolute; right: 10px; top: 10px;" onclick="logout()">Logg ut</button>
  <div style="display: flex; width: 100%; flex-direction: column; justify-content: center; align-items: center;">
    <h2>Velkommen til PC utlån</h2>
    <h3>Denne nettsiden er dedikert til å gjøre det enkelt å låne PC-er.</h3>
  </div>
  <div class="splash_art">
    <h2>PC Låneportal</h2>
    <p>Ledige PC-er: <strong id="available">...</strong></p>
    <p>Neste tilgjengelige: <strong id="next">...</strong></p>
  </div>
  <div id="foresprørselDiv" style="display: none; flex-direction: column; width: 100%; justify-content: center; align-items: center;">
    <button id="openFormButton" style="width: 100px; height: 50px; border-radius: 10px; cursor: pointer;" onclick="requestLoan()">Send in forespørsel</button>
  </div>
  <div id="aktivLåntDiv">
    <div style="display: flex; 
    flex-direction: column;
    justify-content: center; 
    align-items: center;
    background-color: rgb(174, 174, 174);
    box-shadow: inset 0 0 10px black;
    padding: 10px;">
      <p id="LåntOverskrift"></p>
      <h3 id="pcLånt"></h3>
      <h3 id="returDato"></h3>
    </div>
  </div>

  <div id="requestPopup" style="display: none;">
    <div  style="border: 3px solid black; 
    border-radius: 20px; 
    background-color: rgb(197, 197, 197);
    position: absolute;
    top: 50%;
    left: 50%;
    transform: translate(-50%, -50%);
    z-index: 1000;">
      <div class="requestLoan">
        <h1 style="text-align: center;">For hvilken lengde vil du låne en PC?</h1>
        <h3>Velg hvilken periode du ønsker å låne en PC</h3>
        <form id="requestForm" style="display: flex; flex-direction: column; justify-content: center; align-items: center; padding: 10px;">
          <h3>Plukke opp dato:</h3>
          <input type="date" name="selectedDate" id="selectedDate">
          <h3>Returnerings dato:</h3>
          <input type="date" name="returnDate" id="returnDate">
          <p id="msg"></p>
          <button style="cursor: pointer;" type="submit">Send</button>
        </form>
      </div>
    </div>
    <button style="position: fixed; left: 0; top: 0; 
    width: 100%; height: 100%; 
    background-color: rgba(0, 0, 0, 0.5);
    border: none;
    outline: none;"
    onclick="closeForm()"></button>
  </div>

  <script>
    function closeForm() {
      document.getElementById("requestPopup").style.display = "none";
      document.getElementById("requestForm").reset();
    }
    async function load() {
      let erLånt = false;
      const me = await fetch("/me", { credentials: "include" }).then(r => r.json());
      if (!me) location.href = "/login.html";

      if (me.role === "admin") {
        document.getElementById("adminBtn").style.display = "block";
      }

      const avail = await fetch("/availability").then(r => r.json());
      document.getElementById("available").textContent = avail.available;

      if (avail.available === 0) {
        document.getElementById("foresprørselDiv").style.display = "none";
        document.getElementById("aktivLåntDiv").style.display = "flex";
        document.getElementById("LåntOverskrift").textContent = "Ingen PC-er tilgjengelig for utlån";
        erLånt = true;
      }


      const ren = await fetch("/rentals", {
        credentials: "include"
      });
      const rentals = await ren.json();

      rentals.forEach(r => {
        if (r.student_email === me.email) {
          if (r.status !== "returned") {
            document.getElementById("foresprørselDiv").style.display = "none";
            document.getElementById("aktivLåntDiv").style.display = "flex";
            document.getElementById("LåntOverskrift").textContent = "Du har allerede lånt en PC og kan ikke låne en ny";
            document.getElementById("pcLånt").textContent = `PC nummer: ${r.pc_number}`;
            document.getElementById("returDato").textContent = `Retur dato: ${new Date(r.return_date).toLocaleDateString()}`;
            erLånt = true;
          }
        }
      });

      const res = await fetch("/requests", {
        credentials: "include"
      });
      const requests = await res.json();

      requests.forEach(req => {
        if (req.student_email === me.email) {
          if (req.status === "pending") {
            document.getElementById("foresprørselDiv").style.display = "none";
            document.getElementById("aktivLåntDiv").style.display = "flex";
            document.getElementById("LåntOverskrift").textContent = "Du har allerede sendt inn en forespørsel og kan ikke sende inn en ny";
            document.getElementById("pcLånt").textContent = `Forespørsel sendt inn`;
            document.getElementById("returDato").textContent = `Venter på godkjenning`;
            erLånt = true;
          }
        }
      });

      if (requests.length > 0) {
        document.getElementById("adminAlert").style.display = "block";
      }

      if (!erLånt) {
        document.getElementById("foresprørselDiv").style.display = "flex";
        document.getElementById("aktivLåntDiv").style.display = "none";
      }

      document.getElementById("next").textContent =
        avail.nextAvailableDate
          ? new Date(avail.nextAvailableDate).toLocaleDateString()
          : "N/A";
    }

    async function requestLoan() {
      const popup = document.getElementById("requestPopup").style.display = "block";
    }

    document.getElementById("requestForm").addEventListener("submit", async (e) => {
      document.documentElement.classList.add("loading");
      e.preventDefault();
      const selectedDate = document.getElementById('selectedDate').value;
      const returnDate = document.getElementById('returnDate').value;

      const res = await fetch("/submit-date", {
        method: "POST",
        headers: {
          "Content-Type": "application/json"
        },
        credentials: "include",
        body: JSON.stringify({ selectedDate, returnDate })
      });

      const data = await res.json();

      if (!res.ok) {
        document.getElementById("msg").textContent = "Du må velge datoer";
        return;
      }
      else {
        document.getElementById("msg").textContent = "";
        const popup = document.getElementById("requestPopup").style.display = "none";
      }
      
      const foresendt = document.getElementById("foresendt");
      foresendt.classList.remove("foresendt");
      void foresendt.offsetWidth; // forces reflow
      foresendt.classList.add("foresendt");
      document.getElementById("requestForm").reset();
      await load();
      document.documentElement.classList.remove("loading");
    });

    load();
  </script>
</body>
</html>
