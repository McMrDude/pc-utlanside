<!DOCTYPE html>
<html>
<head>
  <meta charset="UTF-8">
  <title>PC Lån</title>
  <link rel="stylesheet" href="style.css"> 
</head>
<body>
  <button id="adminBtn" style="display: none;" onclick="location.href='/admin.html'">
    Admin
  </button>
  <div style="border: 1px solid #ff0000; display: flex; width: 100vw; flex-direction: column; justify-content: center; align-items: center;">
    <h2>Velkommen til PC utlåns</h2>
    <h3>Denne nettsiden er dedikert til å gjøre det enkelt å låne PC-er.</h3>
  </div>
  <div class="splash_art">
    <h2>PC Låneportal</h2>
    <p>Ledige PC-er: <strong id="available">...</strong></p>
    <p>Neste tilgjengelige: <strong id="next">...</strong></p>
  </div>
  <div style="display: flex; flex-direction: column; border: 1px solid #ff0000; width: 100vw; justify-content: center; align-items: center;">
    <button style="width: 100px; height: 50px; border-radius: 10px; " onclick="requestLoan()">Send in forespørsel</button>
  </div>

  <div id="requestPopup" style="border: 3px solid black; 
  border-radius: 20px; 
  background-color: rgb(197, 197, 197);
  position: absolute;
  top: 50%;
  left: 50%;
  transform: translate(-50%, -50%);
  display: none;">
    <div class="requestLoan">
      <h1 style="text-align: center;">For hvilken lengde vil du låne en PC?</h1>
      <h3>Velg hvilken periode du ønsker å låne en PC</h3>
      <form method="POST" action="/submit-date">
        <h3>Plukke opp dato:</h3>
        <input type="date" name="selectedDate">
        <h3 >Returnerings dato:</h3>
        <input type="date" name="returnDate">
        <button type="submit" onclick="sendRequest()">Send</button>
      </form>
    </div>
  </div>

  <p id="msg"></p>

  <script>
    async function load() {
      const me = await fetch("/me", { credentials: "include" }).then(r => r.json());
      if (!me) location.href = "/login.html";

      if (me.role === "admin") {
        document.getElementById("adminBtn").style.display = "block";
      }

      const avail = await fetch("/availability").then(r => r.json());
      document.getElementById("available").textContent = avail.available;
      document.getElementById("next").textContent =
        avail.nextAvailableDate
          ? new Date(avail.nextAvailableDate).toLocaleDateString()
          : "N/A";
    }

    async function requestLoan() {
      const popup = document.getElementById("requestPopup").style.display = "block";
    }

    async function sendRequest() {
      const popup = document.getElementById("requestPopup").style.display = "none";
    }

    load();
  </script>
</body>
</html>
